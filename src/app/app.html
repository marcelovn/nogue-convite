@if (showNavigation()) {
  <nav class="main-nav">
    <div class="nav-container">
      <div class="nav-brand">
        <img ngSrc="/assets/logo.svg" width="28" height="28" alt="" class="brand-logo" />
        <span class="brand-text">Convitei Eventos</span>
      </div>
      <div class="nav-links">
        <a routerLink="/editor" routerLinkActive="active">Criar Grátis</a>
        <a routerLink="/dashboard" routerLinkActive="active">Painel</a>
      </div>
    </div>
  </nav>
}

<main [class.public-invite]="isPublicInvite()">
  <router-outlet />
</main>

@if (showNavigation()) {
  <footer class="main-footer">
    <p>Convitei Eventos &copy; 2026 &mdash; Confirmações em minutos no WhatsApp, sem dor de cabeça</p>
  </footer>
}

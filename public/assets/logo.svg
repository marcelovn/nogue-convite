<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradiente principal do envelope -->
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e63ff"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <!-- Gradiente do lacre/coração -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e63ff" flood-opacity="0.25"/>
    </filter>
    <filter id="shadowHeart" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff1744" flood-opacity="0.4"/>
    </filter>
  </defs>


  <!-- Envelope corpo -->
  <rect x="30" y="65" width="140" height="95" rx="14" ry="14" fill="url(#envGrad)" filter="url(#shadow)"/>

  <!-- Envelope flap dobrado (fechado) -->
  <path d="M30 79 L100 130 L170 79 L170 65 Q170 65 100 115 Q30 65 30 65 Z" fill="#1a55e3" opacity="0.85"/>

  <!-- Linha diagonal esquerda -->
  <line x1="30" y1="160" x2="100" y2="115" stroke="#1552CC" stroke-width="1.5" opacity="0.5"/>
  <!-- Linha diagonal direita -->
  <line x1="170" y1="160" x2="100" y2="115" stroke="#1552CC" stroke-width="1.5" opacity="0.5"/>

  <!-- Coração lacre no centro do flap -->
  <g filter="url(#shadowHeart)" transform="translate(100, 108)">
    <path d="M0 -10 C-3 -15, -12 -15, -12 -6 C-12 0, 0 10, 0 10 C0 10, 12 0, 12 -6 C12 -15, 3 -15, 0 -10 Z"
          fill="url(#heartGrad)"/>
  </g>

  <!-- Confete decorativo - bolinhas pequenas em volta -->
  <!-- Superior esquerda -->
  <circle cx="52" cy="42" r="5" fill="#FF6B9D" opacity="0.85"/>
  <circle cx="38" cy="55" r="3.5" fill="#FFD700" opacity="0.9"/>
  <circle cx="68" cy="32" r="3" fill="#00C853" opacity="0.85"/>
  <!-- Superior direita -->
  <circle cx="148" cy="42" r="5" fill="#B71FFF" opacity="0.85"/>
  <circle cx="162" cy="55" r="3.5" fill="#FF5722" opacity="0.9"/>
  <circle cx="132" cy="32" r="3" fill="#1e63ff" opacity="0.7"/>
  <!-- Inferior -->
  <circle cx="65" cy="172" r="4" fill="#FF1744" opacity="0.7"/>
  <circle cx="135" cy="172" r="4" fill="#00C853" opacity="0.7"/>

  <!-- Retângulos de confete inclinados -->
  <rect x="42" y="38" width="8" height="4" rx="1" fill="#FFD700" opacity="0.8" transform="rotate(-30 46 40)"/>
  <rect x="148" y="38" width="8" height="4" rx="1" fill="#FF6B9D" opacity="0.8" transform="rotate(30 152 40)"/>
  <rect x="58" y="168" width="7" height="3.5" rx="1" fill="#B71FFF" opacity="0.7" transform="rotate(20 61 170)"/>
  <rect x="138" y="168" width="7" height="3.5" rx="1" fill="#FF5722" opacity="0.7" transform="rotate(-20 141 170)"/>

  <!-- Estrelinhas -->
  <text x="38" y="48" font-size="10" fill="#FFD700" opacity="0.9">✦</text>
  <text x="152" y="48" font-size="10" fill="#FF6B9D" opacity="0.9">✦</text>
  <text x="92" y="24" font-size="8" fill="#B71FFF" opacity="0.8">✦</text>
</svg>
